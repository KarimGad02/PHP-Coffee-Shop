<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Cafeteria Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="edit-user" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="/admin/dashboard.php">Cafeteria Admin</a>
            <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-light" href="/admin/all-users.html">All Users</a>
                <a class="btn btn-sm btn-outline-light" href="/admin/add-user.html">Add User</a>
                <button class="btn btn-sm btn-outline-warning logout-btn" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <h2 class="fw-bold mb-4 section-title">Edit User</h2>

        <div class="glass-card p-4" style="max-width: 760px; margin: 0 auto;">
            <form id="editUserForm" enctype="multipart/form-data">
                <input type="hidden" id="userId" name="id">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input class="form-control" type="text" id="name" name="name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" id="email" name="email" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" placeholder="Leave blank to keep current password">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Room Number</label>
                        <input class="form-control" type="text" id="room_number" name="room_number">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Extension</label>
                        <input class="form-control" type="text" id="extension" name="extension">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" id="role" name="role">
                            <option value="customer">Customer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Profile Image</label>
                        <input class="form-control" type="file" name="profile_image" accept="image/*">
                        <img id="profileImagePreview" alt="Profile preview" style="display:none; max-width:120px; margin-top:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-coffee-primary" type="submit">Save Changes</button>
                    <a class="btn btn-coffee-secondary" href="/admin/all-users.html">Cancel</a>
                </div>
            </form>
            <div id="userEditMessage" style="display:none;"></div>
        </div>
    </div>

    <footer class="text-center py-3 mt-auto">
        &copy; 2026 Cafeteria System.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-management.js"></script>
</body>
</html>
