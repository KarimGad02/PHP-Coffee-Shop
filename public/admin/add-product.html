<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Cafeteria Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="add-product" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg" style="background-color: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" style="color: #FF3300; letter-spacing: 1px;" href="/admin/dashboard.php">Cafeteria Admin</a>
            <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-light" href="/admin/all-products.html">All Products</a>
                <a class="btn btn-sm btn-outline-light" href="/admin/all-users.html">Users</a>
                <button class="btn btn-sm btn-outline-warning logout-btn" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <h2 class="fw-bold mb-4" style="color: #FF5722;">Add Product</h2>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="glass-card p-4">
                    <form id="addProductForm" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Product Name</label>
                                <input class="form-control" type="text" name="name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Price</label>
                                <input class="form-control" type="number" min="0" step="0.01" name="price" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="category_id" name="category_id"></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Availability</label>
                                <select class="form-select" name="is_available">
                                    <option value="1">Available</option>
                                    <option value="0">Unavailable</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Product Image</label>
                                <input class="form-control" type="file" name="image" accept="image/*">
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button class="btn" type="submit" style="background:#FF3300;color:white;font-weight:700;">Add Product</button>
                            <a class="btn btn-outline-light" href="/admin/all-products.html">Back to Products</a>
                        </div>
                    </form>
                    <div id="productFormMessage" style="display:none;"></div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="glass-card p-4">
                    <h5 class="mb-3" style="color:#E0F2FE;">Quick Add Category</h5>
                    <form id="quickCategoryForm">
                        <label class="form-label">New Category Name</label>
                        <input id="newCategoryName" class="form-control" type="text" required>
                        <button class="btn mt-3" type="submit" style="background:#00B4D8;color:white;font-weight:700;">Create Category</button>
                    </form>
                    <div id="categoryMessage" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-auto" style="color: rgba(255, 255, 255, 0.5); font-size: 0.8rem;">
        &copy; 2026 Cafeteria System.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-management.js"></script>
</body>
</html>
