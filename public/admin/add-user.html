<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Cafeteria Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="add-user" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg" style="background-color: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" style="color: #FF3300; letter-spacing: 1px;" href="/admin/dashboard.php">Cafeteria Admin</a>
            <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-light" href="/admin/all-users.html">All Users</a>
                <a class="btn btn-sm btn-outline-light" href="/admin/add-product.html">Add Product</a>
                <button class="btn btn-sm btn-outline-warning logout-btn" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <h2 class="fw-bold mb-4" style="color: #FF5722;">Add User</h2>

        <div class="glass-card p-4" style="max-width: 760px; margin: 0 auto;">
            <form id="addUserForm" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input class="form-control" type="text" name="name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Room Number</label>
                        <input class="form-control" type="text" name="room_number" placeholder="2010">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Extension</label>
                        <input class="form-control" type="text" name="extension" placeholder="5605">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" name="role">
                            <option value="customer">Customer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Profile Image</label>
                        <input class="form-control" type="file" name="profile_image" accept="image/*">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button class="btn" type="submit" style="background:#FF3300;color:white;font-weight:700;">Create User</button>
                    <a class="btn btn-outline-light" href="/admin/all-users.html">Back to Users</a>
                </div>
            </form>
            <div id="userFormMessage" style="display:none;"></div>
        </div>
    </div>

    <footer class="text-center py-3 mt-auto" style="color: rgba(255, 255, 255, 0.5); font-size: 0.8rem;">
        &copy; 2026 Cafeteria System.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-management.js"></script>
</body>
</html>
